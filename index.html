<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#060d0a">
<title>Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --mint:    #62E4A9;
    --mint-bright: #a2f7d1;
    --bg:      #060d0a;
    --bg-card: rgba(20, 38, 29, 0.4);
    --glass:   rgba(255, 255, 255, 0.03);
    --border:  rgba(87, 203, 152, 0.12);
    --border-bright: rgba(87, 203, 152, 0.3);
    --text:    #e0f2e9;
    --muted:   #7fa691;
    --muted2:  #446351;
    --danger:  #ef9a9a;
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { 
    background: var(--bg); 
    background-image: radial-gradient(circle at top right, #0e2218 0%, #060d0a 100%);
    color: var(--text); 
    font-family: 'DM Mono', monospace; 
    min-height: 100vh; 
    padding-top: env(safe-area-inset-top);
  }

  /* MODERN NAV */
  .nav { 
    position: sticky; top: 0; z-index: 100; 
    background: rgba(6, 13, 10, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 0 24px; height: 64px; 
  }
  .nav-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; letter-spacing: 0.5px; color: var(--mint); }
  .nav-tabs { display: flex; gap: 4px; background: var(--glass); padding: 4px; border-radius: 10px; }
  .nav-tab { 
    background: none; border: none; padding: 6px 12px; border-radius: 7px;
    font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; 
    text-transform: uppercase; color: var(--muted); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .nav-tab.active { background: var(--mint); color: var(--bg); font-weight: 500; }

  /* CONTAINER */
  .page { display:none; padding: 24px 20px 100px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .page.active { display:block; }

  /* MODERN CARDS */
  .card {
    background: var(--bg-card);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 12px;
    transition: all 0.3s ease;
  }
  .card:active { transform: scale(0.99); border-color: var(--border-bright); }

  /* DAY SELECTOR */
  .day-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 32px; }
  .day-btn { 
    background: var(--glass); border: 1px solid var(--border); border-radius: 12px; 
    padding: 16px 8px; cursor: pointer; text-align: center; transition: all 0.2s; 
  }
  .day-btn.sel { background: var(--mint); border-color: var(--mint); }
  .day-lbl { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--text); display: block; }
  .day-btn.sel .day-lbl, .day-btn.sel .day-sub { color: var(--bg); }
  .day-sub { font-size: 9px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }

  /* EXERCISE ITEMS */
  .ex-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; cursor: pointer; }
  .ex-name { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 400; color: var(--text); }
  .badge { font-size: 10px; background: var(--glass); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; color: var(--muted); }
  .badge.primary { border-color: var(--mint); color: var(--mint); }

  /* INPUTS */
  .sinput { 
    background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; 
    padding: 12px; color: var(--mint); font-family: 'DM Mono'; font-size: 15px; width: 100%; text-align: center;
  }
  .sinput:focus { border-color: var(--mint); outline: none; background: rgba(0,0,0,0.4); }
  
  /* ACTION BUTTONS */
  .finish-btn { 
    position: fixed; bottom: 30px; left: 20px; right: 20px; max-width: 560px; margin: 0 auto;
    background: var(--mint); color: var(--bg); border: none; border-radius: 14px; padding: 18px;
    font-family: 'DM Mono'; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    box-shadow: 0 10px 30px rgba(98, 228, 169, 0.2);
  }

  /* TYPOGRAPHY REFINEMENTS */
  .slabel { font-size: 10px; letter-spacing: 3px; color: var(--mint); text-transform: uppercase; opacity: 0.6; margin: 32px 0 12px; }
  
  /* SCROLLBARS */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 10px; }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-title">Training Log</span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('log',this)">Log</button>
    <button class="nav-tab" onclick="showPage('history',this)">History</button>
    <button class="nav-tab" onclick="showPage('plan',this)">Plan</button>
  </div>
</nav>

</body>
</html>
