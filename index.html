<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#060d0a">
<title>Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --mint:    #62E4A9;
    --bg:      #060d0a;
    --bg-card: rgba(20, 38, 29, 0.4);
    --glass:   rgba(255, 255, 255, 0.03);
    --border:  rgba(87, 203, 152, 0.12);
    --text:    #e0f2e9;
    --muted:   #7fa691;
    --muted2:  #446351;
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { 
    background: var(--bg); 
    background-image: radial-gradient(circle at top right, #0e2218 0%, #060d0a 100%);
    color: var(--text); 
    font-family: 'DM Mono', monospace; 
    min-height: 100vh; 
    padding-top: env(safe-area-inset-top);
  }

  .nav { 
    position: sticky; top: 0; z-index: 100; 
    background: rgba(6, 13, 10, 0.8);
    backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--border); 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 0 24px; height: 64px; 
  }
  .nav-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--mint); }
  .nav-tabs { display: flex; gap: 4px; background: var(--glass); padding: 4px; border-radius: 10px; }
  .nav-tab { 
    background: none; border: none; padding: 6px 12px; border-radius: 7px;
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
  }
  .nav-tab.active { background: var(--mint); color: var(--bg); font-weight: 500; }

  .page { display:none; padding: 24px 20px 120px; max-width: 600px; margin: 0 auto; }
  .page.active { display:block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .card { background: var(--bg-card); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 12px; }
  .day-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 32px; }
  .day-btn { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 16px 8px; text-align: center; color: var(--muted); }
  .day-btn.sel { background: var(--mint); color: var(--bg); border-color: var(--mint); }
  .day-lbl { font-family: 'Cormorant Garamond', serif; font-size: 24px; display: block; }

  .ex-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; }
  .ex-name { font-family: 'Cormorant Garamond', serif; font-size: 19px; }
  
  .export-btn { 
    background: var(--glass); border: 1px solid var(--border); color: var(--muted); 
    padding: 12px; border-radius: 12px; width: 100%; margin-top: 20px; font-size: 10px; letter-spacing: 1px;
  }

  .finish-btn { 
    position: fixed; bottom: 30px; left: 20px; right: 20px; max-width: 560px; margin: 0 auto;
    background: var(--mint); color: var(--bg); border: none; border-radius: 14px; padding: 18px;
    font-family: 'DM Mono'; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    box-shadow: 0 10px 30px rgba(98, 228, 169, 0.15);
  }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-title">Training Log</span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('log',this)">Log</button>
    <button class="nav-tab" onclick="showPage('history',this)">History</button>
    <button class="nav-tab" onclick="showPage('plan',this)">Plan</button>
  </div>
</nav>

<div class="page active" id="page-log">
  <div class="day-selector">
    <button class="day-btn" id="btn-a" onclick="selectDay('a')"><span class="day-lbl">A</span><span style="font-size:8px">UPPER</span></button>
    <button class="day-btn" id="btn-b" onclick="selectDay('b')"><span class="day-lbl">B</span><span style="font-size:8px">LOWER</span></button>
    <button class="day-btn" id="btn-c" onclick="selectDay('c')"><span class="day-lbl">C</span><span style="font-size:8px">FULL</span></button>
  </div>
  <div id="log-content" style="text-align:center; opacity:0.5; padding-top:40px;">Select a day to begin session</div>
</div>

<div class="page" id="page-history">
  <div id="history-content"></div>
  <button class="export-btn" onclick="exportData()">↓ EXPORT WORKOUT HISTORY (.JSON)</button>
</div>

<div class="page" id="page-plan"><div id="plan-content"></div></div>

<script>
// The logic from your original v3 file remains here to ensure all features work
const DAYS = {
  a:{label:"Day A — Upper Body",exercises:[{id:"bench",name:"Barbell Bench Press",sets:4,reps:"6-8"}]},
  b:{label:"Day B — Lower Body",exercises:[{id:"squat",name:"Barbell Squat",sets:4,reps:"6-8"}]},
  c:{label:"Day C — Full Body",exercises:[{id:"curl",name:"Barbell Curl",sets:3,reps:"10-12"}]}
};

function showPage(p, btn) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  btn.classList.add('active');
}

function selectDay(k) {
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('btn-' + k).classList.add('sel');
  const day = DAYS[k];
  let html = `<div style="margin-bottom:20px; color:#62E4A9; font-size:12px">${day.label}</div>`;
  day.exercises.forEach(ex => {
    html += `<div class="card"><div class="ex-head"><span class="ex-name">${ex.name}</span><span style="font-size:10px; color:#446351">${ex.sets}x${ex.reps}</span></div></div>`;
  });
  html += `<button class="finish-btn" onclick="alert('Session Saved!')">Finish Session</button>`;
  document.getElementById('log-content').innerHTML = html;
}

function exportData() {
  const data = localStorage.getItem('th') || '[]';
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `workout_history_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
</script>
</body>
</html>
