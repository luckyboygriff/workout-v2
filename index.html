<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#060d0a">
<title>Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --mint:    #62E4A9;
    --bg:      #060d0a;
    --bg-card: rgba(20, 38, 29, 0.4);
    --glass:   rgba(255, 255, 255, 0.03);
    --border:  rgba(87, 203, 152, 0.12);
    --text:    #e0f2e9;
    --muted:   #7fa691;
    --muted2:  #446351;
    --danger:  #ef9a9a;
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { 
    background: var(--bg); 
    background-image: radial-gradient(circle at top right, #0e2218 0%, #060d0a 100%);
    color: var(--text); 
    font-family: 'DM Mono', monospace; 
    min-height: 100vh; 
    padding-top: env(safe-area-inset-top);
    overflow-x: hidden;
  }

  /* MODERN NAV */
  .nav { 
    position: sticky; top: 0; z-index: 100; 
    background: rgba(6, 13, 10, 0.8);
    backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--border); 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 0 24px; height: 64px; 
  }
  .nav-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--mint); }
  .nav-tabs { display: flex; gap: 4px; background: var(--glass); padding: 4px; border-radius: 10px; }
  .nav-tab { 
    background: none; border: none; padding: 6px 12px; border-radius: 7px;
    font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; 
    text-transform: uppercase; color: var(--muted); transition: all 0.3s ease;
  }
  .nav-tab.active { background: var(--mint); color: var(--bg); font-weight: 500; }

  /* PAGES */
  .page { display:none; padding: 24px 20px 120px; max-width: 600px; margin: 0 auto; }
  .page.active { display:block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .slabel { font-size: 10px; letter-spacing: 3px; color: var(--mint); text-transform: uppercase; opacity: 0.5; margin: 32px 0 12px; }

  /* DAY SELECTOR */
  .day-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 32px; }
  .day-btn { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 16px 8px; text-align: center; transition: 0.2s; }
  .day-btn.sel { background: var(--mint); border-color: var(--mint); }
  .day-lbl { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--text); display: block; }
  .day-btn.sel .day-lbl { color: var(--bg); }
  .day-sub { font-size: 9px; color: var(--muted); text-transform: uppercase; }
  .day-btn.sel .day-sub { color: var(--bg); opacity: 0.7; }

  /* EXERCISE CARDS */
  .card { background: var(--bg-card); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 8px; overflow: hidden; }
  .ex-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; cursor: pointer; }
  .ex-name { font-family: 'Cormorant Garamond', serif; font-size: 19px; }
  .badge { font-size: 10px; background: var(--glass); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; color: var(--muted); }
  .badge.primary { border-color: var(--mint); color: var(--mint); }

  /* LOGGING INPUTS */
  .ex-body { padding: 0 20px 20px; border-top: 1px solid var(--border); display: none; }
  .ex-body.open { display: block; }
  .sinput { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--mint); font-family: 'DM Mono'; font-size: 15px; width: 100%; text-align: center; outline: none; }
  .set-row { display: grid; grid-template-columns: 30px 1fr 1fr 40px; gap: 10px; align-items: center; margin-bottom: 10px; }
  .sdone { background: var(--glass); border: 1px solid var(--border); border-radius: 50%; height: 32px; width: 32px; color: var(--muted); }
  .sdone.done { background: var(--mint); color: var(--bg); border-color: var(--mint); }

  /* TIMER & FINISH */
  .timer-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .t-val { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: var(--mint); }
  .finish-btn { position: fixed; bottom: 30px; left: 20px; right: 20px; max-width: 560px; margin: 0 auto; background: var(--mint); color: var(--bg); border: none; border-radius: 14px; padding: 18px; font-family: 'DM Mono'; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; box-shadow: 0 10px 30px rgba(98, 228, 169, 0.15); z-index: 10; }

  /* HISTORY CARDS */
  .hcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
  .export-btn { background: var(--glass); border: 1px solid var(--border); color: var(--muted); padding: 14px; border-radius: 12px; width: 100%; margin-top: 20px; font-size: 10px; letter-spacing: 1px; }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-title">Training Log</span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('log',this)">Log</button>
    <button class="nav-tab" onclick="showPage('history',this)">History</button>
    <button class="nav-tab" onclick="showPage('plan',this)">Plan</button>
  </div>
</nav>

<div class="page active" id="page-log">
  <div class="day-selector">
    <button class="day-btn" id="btn-a" onclick="selectDay('a')"><span class="day-lbl">A</span><span class="day-sub">Upper</span></button>
    <button class="day-btn" id="btn-b" onclick="selectDay('b')"><span class="day-lbl">B</span><span class="day-sub">Lower</span></button>
    <button class="day-btn" id="btn-c" onclick="selectDay('c')"><span class="day-lbl">C</span><span class="day-sub">Full</span></button>
  </div>
  <div id="log-content"><div class="empty">Select a day to begin session</div></div>
</div>

<div class="page" id="page-history">
  <div id="history-content"></div>
  <button class="export-btn" onclick="exportHistory()">↓ EXPORT DATA (.JSON)</button>
</div>

<div class="page" id="page-plan"><div id="plan-content"></div></div>

<script>
// --- FULL DATA & LOGIC RESTORED FROM V3 ---
const DAYS = {
  a:{label:"Day A — Upper Body",focus:"Push + Pull",exercises:[
    {id:"bench",   name:"Barbell Bench Press",     sets:4,reps:"6–8",   p:true, att:"Barbell → Deck",                    cue:"Control descent 2–3s. Drive chest."},
    {id:"row",     name:"Bent-Over Barbell Row",   sets:4,reps:"6–8",   p:true, att:"Barbell → Deck",                    cue:"Hinge 45°. Pull to lower ribcage."},
    {id:"pulldown",name:"Lat Pulldown",            sets:3,reps:"10–12", p:false,att:"Multifunction Bar",                cue:"Pull to upper chest."},
    {id:"ohpress", name:"Cable Overhead Press",    sets:3,reps:"10–12", p:false,att:"Handles → Deck",                   cue:"Press straight up. Brace core."},
    {id:"fly",     name:"Cable Chest Fly",         sets:3,reps:"12–15", p:false,att:"Handles → Rack Slides",            cue:"Slight elbow bend. Squeeze center."},
    {id:"facepull",name:"Face Pull",               sets:3,reps:"15–20", p:false,att:"Rope → Rack Slide",                cue:"Elbows flare high. Pull to forehead."}
  ]},
  b:{label:"Day B — Lower Body",focus:"Hinge + Squat",exercises:[
    {id:"deadlift",name:"Barbell Deadlift",        sets:4,reps:"5–6",   p:true, att:"Barbell → Deck",                    cue:"Brace, hinge, drive floor away."},
    {id:"squat",   name:"Barbell Squat",           sets:4,reps:"6–8",   p:true, att:"Barbell → Deck",                    cue:"Depth to parallel minimum. Chest up."},
    {id:"rdl",     name:"Romanian Deadlift",       sets:3,reps:"10–12", p:false,att:"Barbell → Deck",                   cue:"Push hips back until hamstrings load."},
    {id:"pullthru",name:"Cable Pull-Through",      sets:3,reps:"12–15", p:false,att:"Rope → Deck",                      cue:"Glutes drive extension."},
    {id:"legext",  name:"Leg Extension",           sets:3,reps:"12–15", p:false,att:"Ankle Strap → Rack Slide",         cue:"Slow eccentric."},
    {id:"calf",    name:"Standing Calf Raise",     sets:4,reps:"15–20", p:false,att:"Barbell → Deck",                   cue:"Full stretch, full contraction."}
  ]},
  c:{label:"Day C — Full Body",focus:"Arms + Weak Points",exercises:[
    {id:"cablesquat",name:"Cable Squat (Goblet)",  sets:3,reps:"10–12",  p:true, att:"Rope → Deck",                      cue:"Full depth warm-up pattern."},
    {id:"singlerow", name:"Single-Arm Cable Row",  sets:3,reps:"10–12",  p:true, att:"Handle → Rack Slide",              cue:"Rotate through torso. No swinging."},
    {id:"incpress",  name:"Cable Incline Press",   sets:3,reps:"10–12",  p:false,att:"Handles → Deck",                   cue:"Upper chest emphasis."},
    {id:"curl",      name:"Barbell Curl",          sets:3,reps:"10–12",  p:false,att:"Barbell → Deck",                   cue:"No swinging. Slow eccentric."},
    {id:"pushdown",  name:"Tricep Rope Pushdown",  sets:3,reps:"12–15",  p:false,att:"Rope → Rack Slide",                cue:"Elbows pinned."},
    {id:"crunch",    name:"Cable Crunch",          sets:3,reps:"15–20",  p:false,att:"Rope → Rack Slide",                cue:"Crunch ribs to hips."}
  ]}
};

let currentDay=null, sessionData={}, timerSeconds=0, timerInterval=null, timerRunning=false, openEx=null;

function showPage(p, btn) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  btn.classList.add('active');
  if(p==='history') renderHistory();
  if(p==='plan') renderPlan();
}

function selectDay(k) {
  currentDay = k; sessionData = {}; openEx = null;
  ['a','b','c'].forEach(x => { document.getElementById('btn-'+x).className = 'day-btn' + (x===k ? ' sel' : ''); });
  renderLog();
}

function renderLog() {
  const c = document.getElementById('log-content');
  if(!currentDay) return;
  const day = DAYS[currentDay];
  let h = `<div class="timer-bar">
    <div><div style="font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px">Timer</div><div class="t-val" id="tdis">${fmt(timerSeconds)}</div></div>
    <button class="badge" onclick="toggleTimer()">${timerRunning?'PAUSE':'START'}</button>
  </div>`;

  day.exercises.forEach(ex => {
    const isOpen = openEx === ex.id;
    if(!sessionData[ex.id]) sessionData[ex.id] = {sets: Array.from({length:ex.sets},()=>({w:'',r:'',d:false}))};
    
    let setRows = isOpen ? `<div style="padding:15px 0">` : '';
    if(isOpen) {
      sessionData[ex.id].sets.forEach((s, i) => {
        setRows += `<div class="set-row">
          <span style="font-size:11px; color:var(--muted2)">${i+1}</span>
          <input class="sinput" type="number" placeholder="lbs" value="${s.w}" onchange="upS('${ex.id}',${i},'w',this.value)">
          <input class="sinput" type="number" placeholder="reps" value="${s.r}" onchange="upS('${ex.id}',${i},'r',this.value)">
          <button class="sdone ${s.d?'done':''}" onclick="togS('${ex.id}',${i})">${s.d?'✓':''}</button>
        </div>`;
      });
      setRows += `</div>`;
    }

    h += `<div class="card">
      <div class="ex-head" onclick="togEx('${ex.id}')">
        <span class="ex-name">${ex.name}</span>
        <span class="badge ${ex.p?'primary':''}">${ex.sets}×${ex.reps}</span>
      </div>
      <div class="ex-body ${isOpen?'open':''}">
        <div style="font-size:11px; color:var(--muted); margin-bottom:10px; line-height:1.4">${ex.cue}</div>
        ${setRows}
      </div>
    </div>`;
  });

  h += `<button class="finish-btn" onclick="finishSession()">Finish Workout</button>`;
  c.innerHTML = h;
}

function togEx(id) { openEx = (openEx === id) ? null : id; renderLog(); }
function upS(id, i, f, v) { sessionData[id].sets[i][f] = v; }
function togS(id, i) { sessionData[id].sets[i].d = !sessionData[id].sets[i].d; renderLog(); }

function finishSession() {
  const history = JSON.parse(localStorage.getItem('th') || '[]');
  history.unshift({id: Date.now(), date: new Date().toLocaleDateString(), day: currentDay, exercises: sessionData, duration: fmt(timerSeconds)});
  localStorage.setItem('th', JSON.stringify(history.slice(0, 50)));
  alert("Session Saved!");
  location.reload();
}

function renderHistory() {
  const h = JSON.parse(localStorage.getItem('th') || '[]');
  const c = document.getElementById('history-content');
  if(!h.length) { c.innerHTML = '<div class="empty">No workouts logged yet</div>'; return; }
  c.innerHTML = '<div class="slabel">Recent Activity</div>' + h.map(s => `
    <div class="hcard">
      <div style="display:flex; justify-content:space-between; align-items:flex-start">
        <div><div style="font-family:Cormorant Garamond; font-size:20px">${s.date}</div><div style="font-size:11px; color:var(--muted)">${s.duration} · Day ${s.day.toUpperCase()}</div></div>
        <button class="badge" onclick="delS(${s.id})">DEL</button>
      </div>
    </div>
  `).join('');
}

function renderPlan() {
  const c = document.getElementById('plan-content');
  let h = '';
  Object.values(DAYS).forEach(d => {
    h += `<div class="slabel">${d.label}</div>`;
    d.exercises.forEach(ex => {
      h += `<div class="card" style="padding:15px 20px; display:flex; justify-content:space-between; align-items:center">
        <div><div class="ex-name">${ex.name}</div><div style="font-size:10px; color:var(--muted)">${ex.att}</div></div>
        <div class="badge">${ex.sets}×${ex.reps}</div>
      </div>`;
    });
  });
  c.innerHTML = h;
}

function delS(id) { if(confirm('Delete?')) { const h = JSON.parse(localStorage.getItem('th')).filter(x=>x.id!==id); localStorage.setItem('th', JSON.stringify(h)); renderHistory(); } }
function fmt(s) { return `${Math.floor(s/60)}m ${s%60}s`; }
function toggleTimer() { if(timerRunning) { clearInterval(timerInterval); timerRunning=false; } else { timerRunning=true; timerInterval=setInterval(()=>{timerSeconds++; document.getElementById('tdis').innerText=fmt(timerSeconds)},1000); } renderLog(); }
function exportHistory() { const d = localStorage.getItem('th') || '[]'; const blob = new Blob([d], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href=url; a.download='workout_backup.json'; a.click(); }
</script>
</body>
</html>
