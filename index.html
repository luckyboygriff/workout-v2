<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Log</title>

<style>
:root {
  --accent:#57CB98;
  --glass:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.15);
  --bg-grad:radial-gradient(circle at 20% 0%, #13221a, #0a0f0d 60%);
  --text:#e8f5ee;
  --muted:rgba(255,255,255,0.5);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
  background:var(--bg-grad);
  color:var(--text);
}

/* NAV */
.nav{
  position:sticky;top:0;z-index:10;
  display:flex;justify-content:space-between;
  padding:16px 20px;
  background:rgba(10,15,13,0.6);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.nav-tabs{display:flex;gap:16px}
.nav-tab{
  background:none;border:none;color:var(--muted);
  font-size:12px;cursor:pointer;position:relative;
}
.nav-tab.active{color:white}
.nav-tab.active::after{
  content:"";position:absolute;bottom:-6px;left:25%;
  width:50%;height:2px;background:var(--accent);
}

/* PAGE */
.page{display:none;padding:20px;max-width:640px;margin:auto}
.page.active{display:block}

/* GLASS */
.glass{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* DAY SELECTOR */
.day-selector{display:flex;gap:10px;margin-bottom:20px}
.day-btn{
  flex:1;padding:16px;border-radius:14px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);
  text-align:center;cursor:pointer;
}
.day-btn.sel{
  background:rgba(87,203,152,0.2);
  border:1px solid rgba(87,203,152,0.5);
}

/* TIMER */
.timer{padding:20px;margin-bottom:16px}
.time{font-size:32px;color:var(--accent)}

/* EXERCISES */
.ex-card{padding:16px;margin-bottom:12px}
.ex-name{font-size:17px;font-weight:500}
.badge{font-size:12px;color:var(--accent)}

.set-row{display:flex;gap:8px;margin-top:10px}
input{
  flex:1;padding:10px;border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
}
input:focus{outline:none;border-color:var(--accent)}

.done-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);
  background:transparent;color:var(--muted);
  cursor:pointer;
}
.done-btn.active{
  border-color:var(--accent);
  color:var(--accent);
}

/* BUTTON */
.finish{
  width:100%;padding:16px;border-radius:14px;
  border:1px solid rgba(87,203,152,0.4);
  background:rgba(87,203,152,0.15);
  color:var(--accent);margin-top:16px;
  cursor:pointer;
}
button:active{transform:scale(.96)}

/* HISTORY */
.hcard{padding:16px;margin-bottom:12px}
.small{font-size:12px;color:var(--muted)}
</style>
</head>

<body>

<div class="nav">
  <div>Training</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('log',this)">Log</button>
    <button class="nav-tab" onclick="showPage('history',this)">History</button>
    <button class="nav-tab" onclick="showPage('plan',this)">Plan</button>
  </div>
</div>

<!-- LOG -->
<div class="page active" id="page-log">

<div class="day-selector">
  <div class="day-btn" onclick="selectDay('a',this)">A<br><small>Upper</small></div>
  <div class="day-btn" onclick="selectDay('b',this)">B<br><small>Lower</small></div>
  <div class="day-btn" onclick="selectDay('c',this)">C<br><small>Full</small></div>
</div>

<div class="glass timer">
  <div class="small">Session Time</div>
  <div class="time" id="time">00:00</div>
  <button onclick="toggleTimer()">Start / Pause</button>
</div>

<div id="log"></div>

<button class="finish" onclick="finish()">Finish Session</button>

</div>

<!-- HISTORY -->
<div class="page" id="page-history">
<div id="history"></div>
</div>

<!-- PLAN -->
<div class="page" id="page-plan">
<div class="glass" style="padding:20px">
  <h3>Program</h3>
  <p class="small">A / B / C Split</p>
</div>
</div>

<script>
const DAYS={
a:[{id:"bench",name:"Bench Press",sets:4,reps:"6-8"},
   {id:"row",name:"Row",sets:4,reps:"6-8"}],
b:[{id:"squat",name:"Squat",sets:4,reps:"6-8"}],
c:[{id:"curl",name:"Curl",sets:3,reps:"10-12"}]
};

let currentDay=null,data={},time=0,int=null;

function showPage(p,btn){
 document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
 document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
 document.getElementById('page-'+p).classList.add('active');
 btn.classList.add('active');
 if(p==="history")renderHistory();
}

function selectDay(k,el){
 currentDay=k;
 document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('sel'));
 el.classList.add('sel');
 render();
}

function render(){
 if(!currentDay)return;
 let html="";
 DAYS[currentDay].forEach(ex=>{
  if(!data[ex.id]) data[ex.id]=Array.from({length:ex.sets},()=>({w:"",r:"",d:false}));
  html+=`<div class="glass ex-card">
    <div class="ex-name">${ex.name}</div>
    <div class="badge">${ex.sets}×${ex.reps}</div>
    ${data[ex.id].map((s,i)=>`
      <div class="set-row">
        <input placeholder="lbs" value="${s.w}" onchange="data['${ex.id}'][${i}].w=this.value">
        <input placeholder="reps" value="${s.r}" onchange="data['${ex.id}'][${i}].r=this.value">
        <button class="done-btn ${s.d?'active':''}" onclick="toggleSet('${ex.id}',${i})">✓</button>
      </div>
    `).join("")}
  </div>`;
 });
 document.getElementById('log').innerHTML=html;
}

function toggleSet(id,i){
 data[id][i].d=!data[id][i].d;
 render();
}

function toggleTimer(){
 if(int){clearInterval(int);int=null;return;}
 int=setInterval(()=>{
  time++;
  document.getElementById('time').innerText=
   String(Math.floor(time/60)).padStart(2,'0')+":"+
   String(time%60).padStart(2,'0');
 },1000);
}

function finish(){
 let h=JSON.parse(localStorage.getItem('h')||"[]");
 h.unshift({date:new Date().toLocaleDateString(),data});
 localStorage.setItem('h',JSON.stringify(h));
 data={};render();
 alert("Saved");
}

function renderHistory(){
 let h=JSON.parse(localStorage.getItem('h')||"[]");
 let html="";
 h.forEach(s=>{
  html+=`<div class="glass hcard">
    <b>${s.date}</b>
    <div class="small">${Object.keys(s.data).length} exercises</div>
  </div>`;
 });
 document.getElementById('history').innerHTML=html;
}
</script>

</body>
</html>
